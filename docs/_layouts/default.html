<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/install/' | relative_url }}">Install</a>
        <a href="{{ '/cli/' | relative_url }}">CLI</a>
        <a href="{{ '/format/' | relative_url }}">Format</a>
        <a href="https://github.com/ljh-sh/upxz">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Apache-2.0 (zstd bindings: MIT) · <a href="https://github.com/ljh-sh/upxz/releases">releases</a> · <a href="https://github.com/ljh-sh/upxz/blob/main/CHANGELOG.md">changelog</a></p>
    </div>
  </footer>
</body>
</html>
