name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test
      - name: cargo build --release (single binary)
        run: cargo build --release

  # Required by the main repository ruleset: a status check named
  # build-and-test must pass before a PR can merge. This job depends on the
  # build-test matrix (which already runs fmt + clippy + test on ubuntu,
  # macos, and windows) and reports the aggregate result under the required
  # name. Renaming the matrix would lose the per-OS signal in the PR UI.
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - run: echo build-and-test passed
