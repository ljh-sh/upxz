name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard analysis and publishes results to the repo's
# Security tab (SARIF) and to scorecard.dev. This backs the Scorecard badge in
# the README. Pattern mirrors the other ljh-sh Rust CLIs (roff / chardet).
#
# Triggers: branch-protection changes, a weekly schedule, pushes to main, and
# manual dispatch. `publish_results: true` requires id-token: write (OIDC).

on:
  branch_protection_rule:
  schedule:
    - cron: '17 3 * * 1'   # weekly, off the top of the hour
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # upload SARIF to the Security tab
      id-token: write           # publish_results via OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # Scorecard recommends this

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
