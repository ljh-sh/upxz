name: Release

# Builds per-platform release binaries and attaches them (plus a SHA256SUMS
# file and cosign keyless signatures) to the GitHub release for the tag.
#
# Pattern follows the other ljh-sh Rust CLIs (roff / chardet / fmeta):
# reproducible build flags (SOURCE_DATE_EPOCH + path remapping), .tar.xz,
# pinned action SHAs, least-privilege per-job permissions, cosign sign-blob
# via OIDC (id-token: write), and SHA256SUMS. OpenSSF-aligned.
#
# Native-only matrix: upxz's build.rs compiles the SFX companion crate
# (stub/loader/winstub) for the HOST, so each target is built on its native
# runner. Cross-arch targets (e.g. aarch64-linux, x86_64-apple-darwin) need
# build.rs to honor --target for the companions first — see issue #11 / TODO.
#
# Triggers:
#   - push tag v*            -> build + attach to that release
#   - workflow_dispatch      -> build + attach to an already-tagged release
#                               (e.g. v0.3.0, tagged before this workflow)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build and publish (e.g. v0.3.0)'
        required: true
        default: v0.3.0

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SOURCE_DATE_EPOCH: 1700000000
  TZ: UTC
  LC_ALL: C

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds only — see comment header about build.rs companions.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@4d1965c9142484e48d40c19de54b5cba84953a06 # v1.10.0

      - name: Build (release, reproducible)
        run: |
          SYSROOT="$(rustc --print sysroot)"
          export RUSTFLAGS="--remap-path-prefix=${{ github.workspace }}=. --remap-path-prefix=$SYSROOT=/rust --remap-path-prefix=$HOME/.cargo=/cargo"
          cargo build --release --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/bin
          cp target/release/upxz dist/bin/
          strip dist/bin/upxz 2>/dev/null || true
          # Normalize mtimes for a reproducible tarball.
          find dist -exec touch -m -t 202311140000.00 {} +
          tar -cJf dist/upxz-${{ matrix.target }}.tar.xz -C dist bin

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/bin | Out-Null
          Copy-Item target/release/upxz.exe dist/bin/upxz.exe
          tar -cJf "dist/upxz-${{ matrix.target }}.tar.xz" -C dist bin

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: upxz-${{ matrix.target }}
          path: dist/upxz-${{ matrix.target }}.tar.xz

  release:
    name: Sign + publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write   # cosign keyless via OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts
          pattern: upxz-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum *.tar.xz > SHA256SUMS
          cd ..
          cat artifacts/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign release artifacts (keyless)
        run: |
          for f in artifacts/*.tar.xz artifacts/SHA256SUMS; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle="${f}.sigstore.json" "$f"
          done

      - name: Attach to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: |
            artifacts/*.tar.xz
            artifacts/SHA256SUMS
            artifacts/*.sigstore.json
