name: Release

# Builds per-platform release binaries and attaches them (plus a SHA256SUMS
# file and cosign keyless signatures) to the GitHub release for the tag.
#
# Pattern follows the other ljh-sh Rust CLIs (roff / chardet / fmeta):
# reproducible build flags (SOURCE_DATE_EPOCH + path remapping), .tar.xz,
# pinned action SHAs, least-privilege per-job permissions, cosign sign-blob
# via OIDC (id-token: write), and SHA256SUMS. OpenSSF-aligned.
#
# Matrix: x86_64 + aarch64 for Linux and macOS, plus x86_64 Windows.
#   - Linux uses **musl static** targets, not gnu. A statically-linked musl
#     binary has NO dynamic libc dependency, so one artifact runs on Alpine AND
#     every glibc distro (Ubuntu/Debian/Fedora/Arch) — gnu (glibc, dynamically
#     linked) would not run on Alpine. Verified end-to-end on Alpine (Docker):
#     the binary is fully static and the SFX (memfd_create + fexecve) runs.
#     musl-gcc (from musl-tools) is used for both C compilation (zstd-sys) and
#     the final link; each runner's musl-gcc targets that runner's arch.
#   - aarch64-unknown-linux-musl builds on a native ARM runner (GA for public
#     repos) so HOST == TARGET.
#   - x86_64-apple-darwin is CROSS-compiled on the arm64 macos runner (no Intel
#     mac runner remains) via an explicit `--target`; this needs build.rs to
#     build the SFX companion crates for TARGET (not HOST) so the embedded
#     loader is x86_64 too. Every build passes `--target` explicitly and copies
#     the artifact from target/<triple>/release/, which keeps the paths uniform
#     for native and cross builds alike.
#
# Triggers:
#   - push tag v*            -> build + attach to that release
#   - workflow_dispatch      -> build + attach to an already-tagged release
#                               (e.g. v0.3.0, tagged before this workflow)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build and publish (e.g. v0.3.0)'
        required: true
        default: v0.3.0

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SOURCE_DATE_EPOCH: 1700000000
  TZ: UTC
  LC_ALL: C

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: musl STATIC (portable to Alpine + all glibc distros).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            musl: true
          # macOS: aarch64 native; x86_64 cross-compiled (needs the target
          # installed — cross_target — and the build.rs --target fix).
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
            cross_target: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install musl toolchain
        # musl static builds need musl-gcc (for zstd-sys C compilation AND the
        # final static link). On each Linux runner musl-gcc targets that
        # runner's own arch, so this one package covers both musl targets.
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Add Rust target
        # The musl targets and the cross-compiled x86_64-apple-darwin target
        # are not installed by the default host toolchain; native macOS/Windows
        # builds already have theirs.
        if: matrix.musl || matrix.cross_target
        run: rustup target add ${{ matrix.target }}

      - name: Build (release, reproducible)
        shell: bash   # bash syntax on all runners (windows-latest defaults to pwsh)
        run: |
          SYSROOT="$(rustc --print sysroot)"
          export RUSTFLAGS="--remap-path-prefix=${{ github.workspace }}=. --remap-path-prefix=$SYSROOT=/rust --remap-path-prefix=$HOME/.cargo=/cargo"
          # musl static: compile C (zstd-sys) AND link with musl-gcc so the
          # binary is fully static (no dynamic libc — runs on Alpine + glibc
          # distros). CC_<triple> selects the C compiler the cc crate uses;
          # -C linker selects rustc's linker. Each runner's musl-gcc targets
          # its own arch. The *-musl target spec defaults to crt-static, so no
          # extra static flag is needed.
          if [ "${{ matrix.musl }}" = "true" ]; then
            TARGET=${{ matrix.target }}
            export "CC_${TARGET//-/_}=musl-gcc"
            export RUSTFLAGS="$RUSTFLAGS -C linker=musl-gcc"
          fi
          # Always pass --target: native builds land in target/<host>/release
          # (== target/release in effect) and cross builds land in
          # target/<triple>/release. build.rs reads TARGET (set by --target) to
          # build the SFX companion crates for the right arch.
          cargo build --release --locked --target ${{ matrix.target }}

      - name: SFX smoke test (Unix)
        # Pack /bin/echo into a self-extractor and run it, asserting it prints
        # the forwarded arg. This guards the SFX loader end-to-end: a clean
        # `cargo build` does NOT catch a loader runtime bug (the macOS
        # fstat/$INODE64 issue broke every x86_64 SFX while the build was green).
        # On the arm64 macos runner the x86_64-apple-darwin SFX runs under
        # Rosetta 2 (preinstalled); aarch64/x86_64-linux run natively. Windows
        # has no /bin/echo and is covered by the winstub unit tests instead.
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/upxz"
          # The x86_64-apple-darwin SFX is run on an arm64 macos runner; ensure
          # Rosetta 2 can translate it (preinstalled on GitHub runners, but
          # install on demand so the smoke test never fails on the environment).
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            arch -x86_64 /usr/bin/true 2>/dev/null || sudo softwareupdate --install-rosetta --agree-to-license
          fi
          "$BIN" -c /bin/echo -o /tmp/smoke.sfx -f
          out=$(/tmp/smoke.sfx hello-from-sfx 2>/dev/null)
          [ "$out" = "hello-from-sfx" ] || { echo "SFX smoke FAILED: got '$out'"; exit 1; }
          echo "SFX smoke OK"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/bin
          cp target/${{ matrix.target }}/release/upxz dist/bin/
          strip dist/bin/upxz 2>/dev/null || true
          # Normalize mtimes for a reproducible tarball.
          find dist -exec touch -m -t 202311140000.00 {} +
          tar -cJf dist/upxz-${{ matrix.target }}.tar.xz -C dist bin

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/bin | Out-Null
          Copy-Item target/${{ matrix.target }}/release/upxz.exe dist/bin/upxz.exe
          tar -cJf "dist/upxz-${{ matrix.target }}.tar.xz" -C dist bin

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upxz-${{ matrix.target }}
          path: dist/upxz-${{ matrix.target }}.tar.xz

  release:
    name: Sign + publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write   # cosign keyless via OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: upxz-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum *.tar.xz > SHA256SUMS
          cd ..
          cat artifacts/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts (keyless)
        run: |
          for f in artifacts/*.tar.xz artifacts/SHA256SUMS; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle="${f}.sigstore.json" "$f"
          done

      - name: Attach to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: |
            artifacts/*.tar.xz
            artifacts/SHA256SUMS
            artifacts/*.sigstore.json
