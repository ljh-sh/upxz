version: 2
# Keeps GitHub Actions (pinned SHAs in .github/workflows) and Cargo deps
# current with weekly pull requests. Bumping the pinned action SHAs matters
# for the OpenSSF Scorecard (which dings floating tags). Pattern mirrors the
# other ljh-sh Rust CLIs (roff / chardet).
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
